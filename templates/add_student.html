<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 20px;
        }

                .nav-buttons {
            margin: 20px;
        }

                .alert {
            width: 50%;
            margin: 20px auto;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

                .success {
    background: #d4edda;
    color: #155724;
            }

                .error {
            background: #f8d7da;
            color: #721c24;
        }



        .back-btn {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
        }

        .form-container {
            width: 50%;
            margin: auto;
            margin-top: 20px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">

        {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
        <h1>Add Student</h1>
    </div>

    <div class="nav-buttons">
        <a href="/dashboard" class="back-btn">← Back</a>
    </div>

    <div class="form-container">
        <form method="POST">

  
<label>Surname / Last Name</label>
<input type="text" name="first_name"
       pattern="[A-Za-z ]+"
       required>

<label>First Name</label>
<input type="text" name="last_name"
       pattern="[A-Za-z ]+"
       required>

<label>Middle Name (Optional)</label>
<input type="text" name="middle_name"
       pattern="[A-Za-z ]*">



            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" required>

            <label>Parent Contact</label>
            <input type="text" name="parent_contact"
                   pattern="[0-9]+"
                   maxlength="10"
                   required>

            <label>Emergency Contact</label>
            <input type="text" name="emergency_contact"
                   pattern="[0-9]+"
                   maxlength="10"
                   required>

            <label>Address</label>
            <input type="text" name="address" required>

            <label>Class</label>

<select name="student_class" required>
    <option value="">Select Class</option>

    {% for cls in classes %}
        <option value="{{ cls }}">{{ cls }}</option>
    {% endfor %}

</select>

            <button type="submit">Save Student</button>

        </form>
    </div>

</body>
</html>
