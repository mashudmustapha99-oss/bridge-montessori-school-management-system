<!DOCTYPE html>
<html>
<head>

<title>Bridge Montessori School Management System</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.png') }}">

<meta name="theme-color" content="#0056b3">

<style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            width:360px;
            padding:40px;
            border-radius:12px;
            box-shadow:0 2px 12px rgba(0,0,0,.12);
        }

        .logo{
            width:120px;
            display:block;
            margin:auto;
            margin-bottom:15px;
        }

        h1{
            text-align:center;
            color:#007bff;
            margin-bottom:5px;
        }

        h3{
            text-align:center;
            color:#555;
            margin-bottom:30px;
            font-weight:normal;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .flash{
            padding:12px;
            border-radius:5px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }

    </style>

</head>

<body>

<div class="login-box">

    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

    <h1>School Management System</h1>
    <h3>Admin Login</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>

    </form>

</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register(
        "{{ url_for('static', filename='service-worker.js') }}"
    )
    .then(function(){
        console.log("Service Worker Registered");
    });
}
</script>

</body>

</html>
