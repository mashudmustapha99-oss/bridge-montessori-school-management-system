<!DOCTYPE html>
<html>

<head>

    <title>Bridge Montessori School Management System</title>

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='images/logo.png') }}">

    <meta name="theme-color" content="#0056b3">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            width:350px;
            padding:40px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#007bff;
        }

        h3{
            text-align:center;
            color:#555;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .flash{
            padding:10px;
            border-radius:5px;
            margin-bottom:20px;
            text-align:center;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }
    </style>

</head>

<body>

<div class="login-box">

<h1>School Management System</h1>
<h3>Admin Login</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="flash {{ category }}">
{{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
