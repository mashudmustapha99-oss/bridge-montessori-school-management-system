<!DOCTYPE html>
<html>
<head>
    <title>Set School Fee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #007bff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .nav-buttons {
            margin: 20px;
        }

        .back-btn {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
        }

        .alert {
            width: 50%;
            margin: 20px auto;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .container {
            width: 50%;
            margin: auto;
            margin-top: 20px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .year-box {
            background: #e9f5ff;
            border-left: 5px solid #007bff;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
            color: #004085;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Set School Fee</h1>
</div>

<div class="nav-buttons">
    <a href="/dashboard" class="back-btn">← Back</a>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert {{ category }}">
    {{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<div class="container">

    <div class="year-box">
        Academic Year:
        <strong>{{ active_year.year }}</strong>
    </div>

    <form method="POST">

        <label>Class</label>

        <select name="student_class" required>

            <option value="">Select Class</option>

            {% for cls in classes %}
                <option value="{{ cls }}">{{ cls }}</option>
            {% endfor %}

        </select>

        <label>Term</label>

        <select name="term" required>
            <option value="">Select Term</option>
            <option value="Term 1">Term 1</option>
            <option value="Term 2">Term 2</option>
            <option value="Term 3">Term 3</option>
        </select>

        <label>Fee Amount (GH₵)</label>

        <input
            type="number"
            name="amount"
            min="1"
            step="0.01"
            required
        >

        <button type="submit">
            Save School Fee
        </button>

    </form>

</div>

</body>
</html>
