```html
<!DOCTYPE html>
<html>
<head>

<title>Edit School Fee</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:40%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 2px 8px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-bottom:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit School Fee</h2>

<form method="POST">

<label>Class</label>

<input
type="text"
value="{{ fee.student_class }}"
readonly>

<label>Term</label>

<input
type="text"
value="{{ fee.term }}"
readonly>

<label>Amount (GHS)</label>

<input
type="number"
step="0.01"
name="amount"
value="{{ fee.amount }}"
required>

<button type="submit">
Update School Fee
</button>

</form>

</div>

</body>
</html>
```
