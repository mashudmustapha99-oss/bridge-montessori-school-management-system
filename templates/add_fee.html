<!DOCTYPE html>
<html>
<head>
    <title>Add Fee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .nav-buttons {
            margin: 20px;
        }

        .back-btn {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
        }

        .alert {
            width: 45%;
            margin: 20px auto;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .form-container {
            width: 45%;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Add Fee Payment</h1>
    </div>

    <div class="nav-buttons">
        <a href="/dashboard" class="back-btn">← Back</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="form-container">
        <form method="POST">

            <label>Student ID</label>
            <input type="text" name="student_id" required>

            <label>Term</label>
            <select name="term" required>
                <option value="">Select Term</option>
                <option>Term 1</option>
                <option>Term 2</option>
                <option>Term 3</option>
            </select>

            <label>Amount Paid</label>
            <input type="number" name="amount_paid" required>

            <button type="submit">Save Fee Payment</button>

        </form>
    </div>

</body>
</html>
