<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .nav-buttons {
            margin: 20px;
        }

        .back-btn {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
        }

        .form-container {
            width: 50%;
            margin: auto;
            margin-top: 20px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e7e34;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Edit Student</h1>
</div>

<div class="nav-buttons">
    <a href="/students" class="back-btn">← Back to Students</a>
</div>

<div class="form-container">

<form method="POST">

    <label>Surname / Last Name</label>
    <input type="text"
           name="first_name"
           value="{{ student.first_name }}"
           pattern="[A-Za-z ]+"
           required>

    <label>First Name</label>
    <input type="text"
           name="last_name"
           value="{{ student.last_name }}"
           pattern="[A-Za-z ]+"
           required>

    <label>Middle Name (Optional)</label>
    <input type="text"
           name="middle_name"
           value="{{ student.middle_name }}"
           pattern="[A-Za-z ]*">

    <label>Gender</label>
    <select name="gender" required>
        <option value="Male" {% if student.gender=="Male" %}selected{% endif %}>Male</option>
        <option value="Female" {% if student.gender=="Female" %}selected{% endif %}>Female</option>
    </select>

    <label>Date of Birth</label>
    <input type="date"
           name="date_of_birth"
           value="{{ student.date_of_birth }}"
           required>

    <label>Parent Contact</label>
    <input type="text"
           name="parent_contact"
           value="{{ student.parent_contact }}"
           pattern="[0-9]+"
           maxlength="10"
           required>

    <label>Emergency Contact</label>
    <input type="text"
           name="emergency_contact"
           value="{{ student.emergency_contact }}"
           pattern="[0-9]+"
           maxlength="10"
           required>

    <label>Address</label>
    <input type="text"
           name="address"
           value="{{ student.address }}"
           required>

    <label>Class</label>

<select name="student_class" required>

    {% for cls in classes %}

        <option value="{{ cls }}"
            {% if student.student_class == cls %}selected{% endif %}>
            {{ cls }}
        </option>

    {% endfor %}

</select>

    <button type="submit">Update Student</button>

</form>

</div>

</body>
</html>
