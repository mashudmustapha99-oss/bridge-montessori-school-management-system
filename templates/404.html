<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Bridge Montessori School</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:500px;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,.15);
        }

        img{
            width:110px;
            margin-bottom:20px;
        }

        h1{
            font-size:80px;
            color:#0056b3;
        }

        h2{
            color:#333;
            margin:15px 0;
        }

        p{
            color:#666;
            margin-bottom:30px;
            line-height:1.6;
        }

        a{
            text-decoration:none;
            background:#0056b3;
            color:white;
            padding:12px 30px;
            border-radius:6px;
            font-weight:bold;
        }

        a:hover{
            background:#003f82;
        }

    </style>

</head>

<body>

<div class="container">

<img src="{{ url_for('static', filename='images/logo.png') }}">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Sorry, the page you are looking for does not exist.

</p>

<a href="{{ url_for('auth.login') }}">

Return to Login

</a>

</div>

</body>

</html>
